openapi: 3.0.0
info:
  title: Blog App API
  version: 1.0.0
  description: API documentation for the Blog App
servers:
  - url: http://localhost:3000
    description: Local server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [ADMIN, BLOGGER]
        profileImage:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
paths:
  /auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [ADMIN, BLOGGER]
                profileImage:
                  type: string
                  format: binary
      responses:
        "201":
          description: User registered successfully
        "400":
          description: Email and password are required
        "409":
          description: User already exists
  /auth/login:
    post:
      summary: Login a user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Successful login
        "400":
          description: Invalid credentials
  /auth/profile:
    get:
      summary: Get the authenticated user's profile
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
        "401":
          description: Unauthorized
        "404":
          description: User not found
  /auth/user:
    post:
      summary: Create a new user (admin only)
      tags: [Auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                profileImage:
                  type: string
                role:
                  type: string
                  enum: [ADMIN, BLOGGER]
      responses:
        "201":
          description: User created successfully
        "400":
          description: Email and password are required or user already exists
        "401":
          description: Unauthorized
  /auth/user/{id}:
    put:
      summary: Update a user (admin only)
      tags: [Auth]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: User ID
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [ADMIN, BLOGGER]
                profileImage:
                  type: string
                  format: binary
      responses:
        "200":
          description: User updated successfully
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "404":
          description: User not found
    delete:
      summary: Delete a user (admin only)
      tags: [Auth]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: User ID
      responses:
        "200":
          description: User deleted successfully
        "401":
          description: Unauthorized
        "404":
          description: User not found
  /auth/users:
    get:
      summary: Get all users (admin only)
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of users
        "401":
          description: Unauthorized
  /auth/updateuser:
    put:
      summary: Update own user profile (cannot change role)
      tags: [Auth]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                profileImage:
                  type: string
                  format: binary
      responses:
        "200":
          description: Profile updated successfully
        "400":
          description: Bad request
        "401":
          description: Unauthorized
  /blogs/my:
    get:
      summary: Get blogs created by the authenticated user
      tags: [Blogs]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of user's blogs
        "401":
          description: Unauthorized
  /blogs:
    post:
      summary: Create a new blog
      tags: [Blogs]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                subtitle:
                  type: string
                content:
                  type: string
                image:
                  type: string
                  format: binary
                category:
                  type: string
      responses:
        "201":
          description: Blog created successfully
        "400":
          description: Bad request
        "401":
          description: Unauthorized
    put:
      summary: Update a blog
      tags: [Blogs]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: Blog ID
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
                image:
                  type: string
                  format: binary
                category:
                  type: string
      responses:
        "200":
          description: Blog updated successfully
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "404":
          description: Blog not found
  /blogs/{id}:
    put:
      summary: Update a blog
      tags: [Blogs]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: Blog ID
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
                image:
                  type: string
                  format: binary
                category:
                  type: string
      responses:
        "200":
          description: Blog updated successfully
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "404":
          description: Blog not found
    delete:
      summary: Delete a blog
      tags: [Blogs]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: Blog ID
      responses:
        "200":
          description: Blog deleted successfully
        "401":
          description: Unauthorized
        "404":
          description: Blog not found
  /blogs/{id}/publish:
    patch:
      summary: Publish a blog
      tags: [Blogs]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: Blog ID
      responses:
        "200":
          description: Blog published successfully
        "401":
          description: Unauthorized
        "404":
          description: Blog not found
  /blogs/{id}/approve:
    patch:
      summary: Approve a blog (admin only)
      tags: [Blogs]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: Blog ID
      responses:
        "200":
          description: Blog approved successfully
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Blog not found
  /blogs/categories:
    post:
      summary: Create a new category
      tags: [Blogs]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Category created successfully
        "400":
          description: Bad request
        "401":
          description: Unauthorized
  /blogs/{id}/like:
    patch:
      summary: Like a blog
      tags: [Blogs]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: Blog ID
      responses:
        "200":
          description: Blog liked successfully
        "401":
          description: Unauthorized
        "404":
          description: Blog not found
  /blogs/{id}/comment:
    post:
      summary: Comment on a blog
      tags: [Blogs]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: Blog ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
      responses:
        "201":
          description: Comment added successfully
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "404":
          description: Blog not found
  /blogs/generate-ai:
    post:
      summary: Generate a blog with AI
      tags: [Blogs]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
      responses:
        "200":
          description: Blog generated successfully
        "400":
          description: Bad request
        "401":
          description: Unauthorized
  /public/blogs:
    get:
      summary: Get all public blogs
      tags: [PublicBlogs]
      responses:
        "200":
          description: List of public blogs
  /public/blogs/search:
    get:
      summary: Search public blogs
      tags: [PublicBlogs]
      parameters:
        - in: query
          name: query
          schema:
            type: string
          required: false
          description: Search query
      responses:
        "200":
          description: Search results
  /public/blogs/search-by-category-tags:
    get:
      summary: Search blogs by category and tags
      tags: [PublicBlogs]
      parameters:
        - in: query
          name: category
          schema:
            type: string
          required: false
          description: Category to filter
        - in: query
          name: tags
          schema:
            type: string
          required: false
          description: Tags to filter (comma separated)
      responses:
        "200":
          description: Filtered search results
